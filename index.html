<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KMB Smart Display</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:#111;
}

/* ===== Top Bar ===== */
.topbar{
background:#5cc27c;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:3vh 5vw;
font-weight:700;
}

.top-left{
font-size:5vh;
letter-spacing:2px;
}

.clock{
font-size:6vh;
}

/* ===== Main Panel ===== */
.panel{
background:#f4f7f8;
min-height:75vh;
padding-top:1vh;
}

.header-row{
display:grid;
grid-template-columns:1.4fr 2fr 2fr 2fr;
padding:2vh 5vw;
color:#7b8a8b;
font-size:2.2vh;
}

.row{
display:grid;
grid-template-columns:1.4fr 2fr 2fr 2fr;
align-items:center;
padding:3vh 5vw;
border-top:1px solid #e0e6e8;
}

/* Route Box */
.route-box{
color:white;
font-size:7vh;
font-weight:800;
display:flex;
justify-content:center;
align-items:center;
border-radius:12px;
height:10vh;
min-width:14vh;
}

.route-green{background:#5cc27c;}
.route-yellow{background:#f4b942;}
.route-red{background:#e74c3c;}

/* NEXT column */
.next{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:1vh;
}

.next-top{
font-size:4vh;
font-weight:700;
}

.next-bottom{
font-size:2.5vh;
color:#666;
}

/* ARRIVING → 站名 */
.station-name{
font-size:3vh;
font-weight:600;
color:#333;
text-align:center;
}

/* STATUS → 總站 */
.terminal{
font-size:3vh;
font-weight:600;
color:#5cc27c;
text-align:center;
}

/* Bottom Bar */
.bottombar{
background:#111;
color:#5cc27c;
display:flex;
justify-content:space-between;
align-items:center;
padding:2vh 5vw;
font-size:2.5vh;
}
</style>
</head>

<body>

<div class="topbar">
<div class="top-left">早晨 社畜！</div>
<div class="clock" id="clock"></div>
</div>

<div class="panel">

<div class="header-row">
<div>ROUTE</div>
<div>NEXT</div>
<div>站名</div>
<div>總站</div>
</div>

<div id="busList"></div>

</div>

<div class="bottombar">
<div>31°C ☁</div>
<div id="date"></div>
<div>LAST <span id="lastUpdate"></span></div>
</div>

<script>
const SERVICE_TYPE="1";

const ROUTES=[
{route:"38",dest:"平田",stopId:"C3672D8D28801773",color:"route-green"},
{route:"42C",dest:"藍田",stopId:"C3672D8D28801773",color:"route-yellow"},
{route:"40P",dest:"觀塘",stopId:"A7516C49B99EFD78",color:"route-red"}
];

let etaData={};
let stopNames={};

function updateClock(){
const now=new Date();
document.getElementById("clock").innerText=
now.toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit',hour12:false});
document.getElementById("date").innerText=
now.toLocaleDateString('zh-HK',{weekday:'short',day:'2-digit',month:'short'});
}

function getMinutes(t){
return Math.max(0,Math.floor((new Date(t)-new Date())/60000));
}

async function fetchStopName(stopId){
if(stopNames[stopId]) return;
try{
const res=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${stopId}`);
const data=await res.json();
stopNames[stopId]=data.data.name_tc;
}catch{
stopNames[stopId]="--";
}
}

function render(){
const list=document.getElementById("busList");
list.innerHTML="";

ROUTES.forEach(r=>{
const row=document.createElement("div");
row.className="row";

const etas=etaData[r.route]||[];
const m1=etas[0]?getMinutes(etas[0]):"--";
const m2=etas[1]?getMinutes(etas[1]):"--";

row.innerHTML=`
<div class="route-box ${r.color}">${r.route}</div>
<div class="next">
<div class="next-top">${m1} min</div>
<div class="next-bottom">${m2} min</div>
</div>
<div class="station-name">${stopNames[r.stopId]||"--"}</div>
<div class="terminal">${r.dest}</div>
`;

list.appendChild(row);
});
}

async function fetchETA(){
for(const r of ROUTES){
await fetchStopName(r.stopId);
try{
const res=await fetch(
`https://data.etabus.gov.hk/v1/transport/kmb/eta/${r.stopId}/${r.route}/${SERVICE_TYPE}`
);
const data=await res.json();
const filtered=data.data.filter(x=>x.dest_tc.includes(r.dest));
etaData[r.route]=filtered.slice(0,2).map(x=>x.eta);
}catch{
etaData[r.route]=[];
}
}
document.getElementById("lastUpdate").innerText=
new Date().toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit',hour12:false});
render();
}

updateClock();
fetchETA();
setInterval(updateClock,1000);
setInterval(fetchETA,15000);
</script>

</body>
</html>

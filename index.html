<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Transit Display</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0f1b2d;
    color: #e6eefc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}

body {
    display: flex;
    flex-direction: column;
}

/* Header */
.header {
    background: #16263d;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2vh 4vw;
}

.stop-title {
    font-size: 5vw;
    font-weight: 600;
}

.time {
    font-size: 8vw;
    font-weight: 700;
}

/* Container */
.container {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Row */
.row {
    display: grid;
    grid-template-columns: 1.2fr 2fr 2fr 1fr 1fr;
    align-items: center;
    padding: 2vh 4vw;
    border-top: 1px solid rgba(255,255,255,0.06);
}

.header-row {
    font-size: 3.5vw;
    color: #7f9cc6;
}

.route {
    font-size: 10vw;
    font-weight: 700;
    color: #39ffb6;
}

.stop-name {
    font-size: 5vw;
    color: #9ecbff;
}

.dest {
    font-size: 6vw;
}

.minutes {
    font-size: 6vw;
    font-weight: 700;
}

.red { color: #ff4c4c; }

/* =========================
   橫向專業版本
========================= */
@media (orientation: landscape) {

    body {
        height: 100vh;
        justify-content: center;
    }

    .header {
        padding: 1vh 4vw;
    }

    .stop-title { font-size: 3vh; }
    .time { font-size: 6vh; }

    .container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        width: 100%;
        max-width: 1500px;
        margin: 0 auto;
    }

    .header-row {
        flex: 0;
        height: 7vh;
        font-size: 2.8vh;
    }

    #busList {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .row {
        flex: 1;
        display: grid;
        grid-template-columns: 1.2fr 2fr 2fr 1fr 1fr;
        place-items: center;
        padding: 0 4vw;
    }

    .route { font-size: 6vh; }
    .stop-name { font-size: 3.5vh; }
    .dest { font-size: 4vh; }
    .minutes { font-size: 4.5vh; }
}
</style>
</head>

<body>

<div class="header">
    <div class="stop-title">葵涌業成街</div>
    <div class="time" id="clock"></div>
</div>

<div class="container">

    <div class="row header-row">
        <div>路線</div>
        <div>站名</div>
        <div>終點</div>
        <div>下一班</div>
        <div>再下一班</div>
    </div>

    <div id="busList"></div>

</div>

<script>
const STOP_ID = "C3672D8D28801773";
const STOP_NAME = "葵涌業成街";
const SERVICE_TYPE = "1";

const ROUTES = [
    { route: "38", dest: "平田" },
    { route: "42C", dest: "藍田站" },
    { route: "40P", dest: "觀塘碼頭" }
];

let etaData = {};

function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});
}

function getMinutes(etaTime) {
    const now = new Date();
    const eta = new Date(etaTime);
    return Math.max(0, Math.floor((eta - now) / 60000));
}

function render() {
    const list = document.getElementById("busList");
    list.innerHTML = "";

    ROUTES.forEach(r => {
        const row = document.createElement("div");
        row.className = "row";

        const etas = etaData[r.route] || [];
        const m1 = etas[0] ? getMinutes(etas[0]) : "--";
        const m2 = etas[1] ? getMinutes(etas[1]) : "--";

        row.innerHTML = `
            <div class="route">${r.route}</div>
            <div class="stop-name">${STOP_NAME}</div>
            <div class="dest">${r.dest}</div>
            <div class="minutes ${m1<=3?'red':''}">${m1}m</div>
            <div class="minutes ${m2<=3?'red':''}">${m2}m</div>
        `;

        list.appendChild(row);
    });
}

async function fetchETA() {
    for (const r of ROUTES) {
        try {
            const res = await fetch(
              `https://data.etabus.gov.hk/v1/transport/kmb/eta/${STOP_ID}/${r.route}/${SERVICE_TYPE}`
            );
            const data = await res.json();
            const filtered = data.data.filter(item =>
                item.dest_tc.includes(r.dest)
            );
            etaData[r.route] = filtered.slice(0,2).map(x=>x.eta);
        } catch {
            etaData[r.route] = [];
        }
    }
    render();
}

updateClock();
fetchETA();

setInterval(updateClock,1000);
setInterval(fetchETA,15000);
</script>

</body>
</html>

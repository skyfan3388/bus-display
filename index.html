<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bus Display">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Transit Display</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0f1b2d;
    color: #e6eefc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;

    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

/* 整頁結構 */
body {
    display: flex;
    flex-direction: column;
}

/* Header */
.header {
    background: #16263d;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2vh 4vw;
}

.left {
    display: flex;
    flex-direction: column;
    gap: 1vh;
}

.stop {
    font-size: 5vw;
    font-weight: 600;
}

.weather {
    font-size: 3.5vw;
    display: flex;
    align-items: center;
    gap: 2vw;
    color: #cfe2ff;
}

.weather img {
    height: 4vw;
}

.time {
    font-size: 8vw;
    font-weight: 700;
}

/* 主內容 */
.container {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* 每一行 */
.row {
    display: grid;
    grid-template-columns: 1.5fr 2.2fr 1fr 1fr;
    align-items: center;
    padding: 3vh 4vw;
    border-top: 1px solid rgba(255,255,255,0.06);
}

.header-row {
    font-size: 3.5vw;
    color: #7f9cc6;
}

.route {
    font-size: 10vw;
    font-weight: 700;
    color: #39ffb6;
}

.dest {
    font-size: 6vw;
}

.minutes {
    font-size: 6vw;
    font-weight: 700;
}

.red { color: #ff4c4c; }

/* ✅ 橫向真正撐滿版本 */
@media (orientation: landscape) {

    body {
        height: 100vh;
    }

    .header {
        padding: 1.5vh 4vw;
    }

    .stop { font-size: 3vh; }
    .weather { font-size: 2vh; }
    .weather img { height: 2.5vh; }
    .time { font-size: 6vh; }

    .container {
        flex: 1;
        height: 100%;
    }

    /* ✅ 每一行平均高度 */
    .row {
        flex: 1;
        display: grid;
        grid-template-columns: 2fr 2fr 1fr 1fr;
        align-items: center;
        padding: 0 6vw;
    }

    .header-row {
        font-size: 4vh;
    }

    /* ✅ 路線更大 */
    .route { font-size: 6vh; }

    .dest { font-size: 4.5vh; }

    .minutes { font-size: 5vh; }
}
</style>
</head>

<body>

<div class="header">
    <div class="left">
        <div class="stop">早晨 社畜!</div>
        <div class="weather">
            <img id="weatherIcon">
            <span id="weatherText">--°C</span>
        </div>
    </div>
    <div class="time" id="clock"></div>
</div>

<div class="container">

    <div class="row header-row">
        <div>路線</div>
        <div>終點</div>
        <div>下一班</div>
        <div>再下一班</div>
    </div>

    <div id="busList" style="flex:1; display:flex; flex-direction:column;"></div>

</div>

<script>
const STOP_ID = "C3672D8D28801773";
const SERVICE_TYPE = "1";

const ROUTES = [
    { route: "38", dest: "平田" },
    { route: "42C", dest: "藍田站" },
    { route: "40P", dest: "觀塘碼頭" }
];

let etaData = {};

function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});
}

function getMinutes(etaTime) {
    const now = new Date();
    const eta = new Date(etaTime);
    return Math.max(0, Math.floor((eta - now) / 60000));
}

function render() {
    const list = document.getElementById("busList");
    list.innerHTML = "";

    ROUTES.forEach(r => {
        const row = document.createElement("div");
        row.className = "row";
        row.style.flex = "1";

        const etas = etaData[r.route] || [];
        const m1 = etas[0] ? getMinutes(etas[0]) : "--";
        const m2 = etas[1] ? getMinutes(etas[1]) : "--";

        row.innerHTML = `
            <div class="route">${r.route}</div>
            <div class="dest">${r.dest}</div>
            <div class="minutes ${m1<=3?'red':''}">${m1}m</div>
            <div class="minutes ${m2<=3?'red':''}">${m2}m</div>
        `;
        list.appendChild(row);
    });
}

async function fetchETA() {
    for (const r of ROUTES) {
        try {
            const res = await fetch(
              `https://data.etabus.gov.hk/v1/transport/kmb/eta/${STOP_ID}/${r.route}/${SERVICE_TYPE}`
            );
            const data = await res.json();
            const filtered = data.data.filter(item =>
                item.dest_tc.includes(r.dest)
            );
            etaData[r.route] = filtered.slice(0,2).map(x=>x.eta);
        } catch {
            etaData[r.route] = [];
        }
    }
    render();
}

async function fetchWeather() {
    try {
        const res = await fetch(
          "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc"
        );
        const data = await res.json();

        const temp = data.temperature.data[1].value;
        const humidity = data.humidity.data[0].value;
        const iconCode = data.icon[0];

        document.getElementById("weatherText").innerText =
          `${temp}°C | ${humidity}%`;

        document.getElementById("weatherIcon").src =
          `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${iconCode}.png`;

    } catch {}
}

updateClock();
fetchETA();
fetchWeather();

setInterval(updateClock,1000);
setInterval(fetchETA,15000);
setInterval(fetchWeather,600000);
</script>

</body>
</html>

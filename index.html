<script>
const SERVICE_TYPE="1";

let ROUTES = JSON.parse(localStorage.getItem("routes")) || [
  {route:"38",dest:"平田",stopId:"C3672D8D28801773"}
];

let etaData = {};
let stopNames = {};
let notified = {};

function routeKey(r){
  return `${r.route}_${r.stopId}_${r.dest}`;
}

function saveRoutes(){
  localStorage.setItem("routes", JSON.stringify(ROUTES));
}

function addRoute(){
  const r = document.getElementById("routeInput").value.trim();
  const d = document.getElementById("destInput").value.trim();
  const s = document.getElementById("stopInput").value.trim();

  if(!r || !d || !s) return;

  // ✅ 防止重複加入
  const exists = ROUTES.some(x =>
    x.route === r && x.stopId === s && x.dest === d
  );

  if(exists){
    alert("已經存在這條路線");
    return;
  }

  ROUTES.push({route:r,dest:d,stopId:s});
  saveRoutes();
  fetchETA();
}

function deleteRoute(route, stopId, dest){
  ROUTES = ROUTES.filter(r =>
    !(r.route === route && r.stopId === stopId && r.dest === dest)
  );

  delete notified[`${route}_${stopId}_${dest}`];

  saveRoutes();
  fetchETA();
}

function clearAll(){
  ROUTES = [];
  notified = {};
  saveRoutes();
  render();
}

function updateClock(){
  const now=new Date();
  clock.innerText=now.toLocaleTimeString('zh-HK',{
    hour:'2-digit',
    minute:'2-digit',
    hour12:false
  });
  date.innerText=now.toLocaleDateString('zh-HK');
}

function getMinutes(t){
  const diff=(new Date(t)-new Date())/60000;
  if(diff<-1) return null;
  return Math.max(0,Math.floor(diff));
}

async function fetchStopName(id){
  if(stopNames[id]) return;
  try{
    const res=await fetch(
      `https://data.etabus.gov.hk/v1/transport/kmb/stop/${id}`
    );
    const data=await res.json();
    stopNames[id]=data.data.name_tc;
  }catch{
    stopNames[id]="--";
  }
}

async function fetchETA(){

  await Promise.all(
    [...new Set(ROUTES.map(r=>r.stopId))]
      .map(fetchStopName)
  );

  const tasks=ROUTES.map(async r=>{
    try{
      const res=await fetch(
        `https://data.etabus.gov.hk/v1/transport/kmb/eta/${r.stopId}/${r.route}/${SERVICE_TYPE}`
      );
      const data=await res.json();
      const filtered=data.data.filter(x=>x.dest_tc.includes(r.dest));

      return {
        key:routeKey(r),
        eta:filtered.slice(0,2).map(x=>x.eta)
      };
    }catch{
      return {key:routeKey(r),eta:[]};
    }
  });

  const results=await Promise.all(tasks);

  results.forEach(r=>{
    etaData[r.key]=r.eta;
  });

  lastUpdate.innerText=new Date().toLocaleTimeString('zh-HK',{
    hour:'2-digit',
    minute:'2-digit'
  });

  render();
}

function render(){

  busList.innerHTML="";

  if(ROUTES.length===0){
    busList.innerHTML="<div style='padding:20px'>暫時沒有路線</div>";
    return;
  }

  ROUTES.forEach(r=>{

    const key = routeKey(r);
    const etas = etaData[key] || [];

    const m1 = etas[0] ? getMinutes(etas[0]) : null;
    const m2 = etas[1] ? getMinutes(etas[1]) : null;

    let urgent = m1===0 || m1===1;

    if(urgent && !notified[key]){
      if(navigator.vibrate){
        navigator.vibrate([200,100,200]);
      }
      notified[key]=true;
    }

    const row=document.createElement("div");
    row.className="row";

    row.innerHTML=`
      <div class="route-box ${urgent?'urgent-box':''}">
        ${r.route}
      </div>
      <div>${m1===null?'--':m1+" 分"}</div>
      <div>${m2===null?'--':m2+" 分"}</div>
      <div>${stopNames[r.stopId]||'--'}</div>
      <div>
        <button onclick="deleteRoute('${r.route}','${r.stopId}','${r.dest}')">
          刪除
        </button>
      </div>
    `;

    busList.appendChild(row);
  });
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

updateClock();
fetchETA();
setInterval(updateClock,1000);
setInterval(render,1000);
setInterval(fetchETA,15000);
</script>

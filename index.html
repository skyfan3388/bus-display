<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>社畜通勤儀表板</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b6b">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
html,body{
margin:0;
padding:0;
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:#1c1f24;
color:#fff;
}

.topbar{
background:#ff6b6b;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
font-weight:800;
}

.clock{font-size:28px;}

.panel{
background:#f1f3f6;
color:#222;
min-height:70vh;
}

.row{
display:grid;
grid-template-columns: 1fr 1fr 1fr 1fr;
padding:16px;
text-align:center;
border-bottom:1px solid #ddd;
align-items:center;
}

.route-box{
background:#2a2f34;
color:#fff;
font-size:28px;
font-weight:900;
border-radius:12px;
padding:10px;
}

.urgent-box{
background:#e53935;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.4}
100%{opacity:1}
}

.bottombar{
background:#111;
color:#ff6b6b;
padding:10px;
display:flex;
justify-content:space-between;
font-size:14px;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#ff6b6b;
color:#fff;
font-weight:600;
}

input{
padding:6px;
border-radius:6px;
border:1px solid #ccc;
}

.add-panel{
padding:12px;
background:#222;
display:flex;
gap:6px;
flex-wrap:wrap;
}
</style>
</head>
<body>

<div class="topbar">
<div>今日又要返工 😮‍💨</div>
<div class="clock" id="clock"></div>
</div>

<div class="add-panel">
<input id="routeInput" placeholder="路線">
<input id="destInput" placeholder="目的地">
<input id="stopInput" placeholder="站ID">
<button onclick="addRoute()">加入</button>
</div>

<div class="panel">
<div id="busList">載入中...</div>
</div>

<div class="bottombar">
<div id="date"></div>
<div>最後更新 <span id="lastUpdate"></span></div>
</div>

<script>
const SERVICE_TYPE="1";
let ROUTES=JSON.parse(localStorage.getItem("routes"))||[
{route:"38",dest:"平田",stopId:"C3672D8D28801773"}
];

let etaData={};
let stopNames={};
let notified={};

function saveRoutes(){
localStorage.setItem("routes",JSON.stringify(ROUTES));
}

function addRoute(){
const r=document.getElementById("routeInput").value;
const d=document.getElementById("destInput").value;
const s=document.getElementById("stopInput").value;
if(!r||!d||!s)return;
ROUTES.push({route:r,dest:d,stopId:s});
saveRoutes();
fetchETA();
}

function updateClock(){
const now=new Date();
clock.innerText=now.toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit',hour12:false});
date.innerText=now.toLocaleDateString('zh-HK');
}

function getMinutes(t){
const diff=(new Date(t)-new Date())/60000;
if(diff<-1)return null;
return Math.max(0,Math.floor(diff));
}

async function fetchStopName(id){
if(stopNames[id])return;
try{
const res=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${id}`);
const data=await res.json();
stopNames[id]=data.data.name_tc;
}catch{
stopNames[id]="--";
}
}

async function fetchETA(){
await Promise.all([...new Set(ROUTES.map(r=>r.stopId))].map(fetchStopName));

const tasks=ROUTES.map(async r=>{
try{
const res=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${r.stopId}/${r.route}/${SERVICE_TYPE}`);
const data=await res.json();
const filtered=data.data.filter(x=>x.dest_tc.includes(r.dest));
return {route:r.route,eta:filtered.slice(0,2).map(x=>x.eta)};
}catch{
return {route:r.route,eta:[]};
}
});

const results=await Promise.all(tasks);
results.forEach(r=>etaData[r.route]=r.eta);

lastUpdate.innerText=new Date().toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});
render();
}

function render(){
busList.innerHTML="";

ROUTES.forEach(r=>{
const etas=etaData[r.route]||[];
const m1=etas[0]?getMinutes(etas[0]):null;
const m2=etas[1]?getMinutes(etas[1]):null;

let urgent=m1===0||m1===1;
if(urgent&&!notified[r.route]){
if(navigator.vibrate)navigator.vibrate([200,100,200]);
notified[r.route]=true;
}

const row=document.createElement("div");
row.className="row";

row.innerHTML=`
<div class="route-box ${urgent?'urgent-box':''}">${r.route}</div>
<div>${m1===null?'--':m1+" 分"}</div>
<div>${m2===null?'--':m2+" 分"}</div>
<div>${stopNames[r.stopId]||'--'}</div>
<div>
  <button onclick="deleteRoute('${r.route}','${r.stopId}')">刪除</button>
</div>
`;

busList.appendChild(row);
});
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

updateClock();
fetchETA();
setInterval(updateClock,1000);
setInterval(render,1000);
setInterval(fetchETA,15000);
</script>

</body>
</html>

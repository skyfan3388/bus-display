<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bus Display">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Transit Display</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: #0f1b2d;
    color: #e6eefc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;

    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

/* HEADER */
.header {
    padding: 3vh 4vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #16263d;
}

.stop {
    font-size: 5vw;
    font-weight: 600;
}

.weather {
    font-size: 3.5vw;
    color: #cfe2ff;
}

.time {
    font-size: 8vw;
    font-weight: 700;
}

/* BUS LIST */
.container {
    width: 100vw;
}

/* 每一行 */
.row {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr 1fr;
    padding: 4vh 4vw;
    border-top: 1px solid rgba(255,255,255,0.06);
    align-items: center;
}

/* 標題 */
.row.header-row {
    font-size: 3.5vw;
    color: #7f9cc6;
}

/* 路線 */
.route {
    font-size: 10vw;
    font-weight: 700;
    color: #39ffb6;
}

/* 終點 */
.dest {
    font-size: 6vw;
}

/* 分鐘 */
.minutes {
    font-size: 6vw;
    font-weight: 700;
}

.red {
    color: #ff4c4c;
}

/* ✅ 橫向模式（真正展示板） */
@media (orientation: landscape) {

    .stop { font-size: 3vh; }
    .weather { font-size: 2vh; }
    .time { font-size: 6vh; }

    .row {
        grid-template-columns: 1fr 3fr 1fr 1fr;
        padding: 3vh 6vw;
    }

    .row.header-row {
        font-size: 2vh;
    }

    .route { font-size: 7vh; }
    .dest { font-size: 4vh; }
    .minutes { font-size: 4vh; }
}
</style>
</head>

<body>

<div class="header">
    <div>
        <div class="stop">業成街</div>
        <div class="weather" id="weatherText">--°C</div>
    </div>
    <div class="time" id="clock"></div>
</div>

<div class="container">

    <div class="row header-row">
        <div>路線</div>
        <div>終點</div>
        <div>下一班</div>
        <div>再下一班</div>
    </div>

    <div id="busList"></div>

</div>

<script>
const STOP_ID = "C3672D8D28801773";
const SERVICE_TYPE = "1";

const ROUTES = [
    { route: "38", dest: "平田" },
    { route: "42C", dest: "藍田站" },
    { route: "40P", dest: "觀塘碼頭" }
];

let etaData = {};

function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});
}

function getMinutes(etaTime) {
    const now = new Date();
    const eta = new Date(etaTime);
    return Math.max(0, Math.floor((eta - now) / 60000));
}

function render() {
    const list = document.getElementById("busList");
    list.innerHTML = "";

    ROUTES.forEach(r => {
        const row = document.createElement("div");
        row.className = "row";

        const etas = etaData[r.route] || [];
        const m1 = etas[0] ? getMinutes(etas[0]) : "--";
        const m2 = etas[1] ? getMinutes(etas[1]) : "--";

        row.innerHTML = `
            <div class="route">${r.route}</div>
            <div class="dest">${r.dest}</div>
            <div class="minutes ${m1<=3?'red':''}">${m1}m</div>
            <div class="minutes ${m2<=3?'red':''}">${m2}m</div>
        `;
        list.appendChild(row);
    });
}

async function fetchETA() {
    for (const r of ROUTES) {
        try {
            const res = await fetch(
              `https://data.etabus.gov.hk/v1/transport/kmb/eta/${STOP_ID}/${r.route}/${SERVICE_TYPE}`
            );
            const data = await res.json();
            const filtered = data.data.filter(item =>
                item.dest_tc.includes(r.dest)
            );
            etaData[r.route] = filtered.slice(0,2).map(x=>x.eta);
        } catch {
            etaData[r.route] = [];
        }
    }
    render();
}

async function fetchWeather() {
    try {
        const res = await fetch(
          "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc"
        );
        const data = await res.json();
        const temp = data.temperature.data[1].value;
        const humidity = data.humidity.data[0].value;
        document.getElementById("weatherText").innerText =
          `${temp}°C | ${humidity}%`;
    } catch {}
}

updateClock();
fetchETA();
fetchWeather();

setInterval(updateClock,1000);
setInterval(fetchETA,15000);
setInterval(fetchWeather,600000);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KMB Smart Display</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:#111;
}

/* ===== Top Bar ===== */
.topbar{
background:#5cc27c;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:2vh 4vw;
font-weight:600;
}

.top-left{
font-size:4vh;
letter-spacing:1px;
}

.top-right{
text-align:right;
}

.clock{
font-size:5vh;
font-weight:700;
}

.greeting{
font-size:2vh;
opacity:0.9;
}

/* ===== Main Panel ===== */
.panel{
background:#f4f7f8;
height:75vh;
padding-top:1vh;
}

.header-row{
display:grid;
grid-template-columns:1.2fr 2fr 2fr 1fr;
padding:1vh 4vw;
color:#7b8a8b;
font-size:2vh;
}

.row{
display:grid;
grid-template-columns:1.2fr 2fr 2fr 1fr;
align-items:center;
padding:2vh 4vw;
border-top:1px solid #e0e6e8;
}

.route-box{
color:white;
font-size:5vh;
font-weight:700;
display:flex;
justify-content:center;
align-items:center;
border-radius:8px;
height:8vh;
}

.route-green{background:#5cc27c;}
.route-yellow{background:#f4b942;}
.route-red{background:#e74c3c;}

.next{
font-size:2.5vh;
color:#555;
}

.arriving{
font-size:6vh;
font-weight:700;
color:#5cc27c;
}

.status{
font-size:2vh;
color:#5cc27c;
font-weight:600;
}

.soon{
color:#e74c3c;
}

/* ===== Bottom Bar ===== */
.bottombar{
background:#111;
color:#5cc27c;
display:flex;
justify-content:space-between;
align-items:center;
padding:1vh 4vw;
font-size:2vh;
}

.weather{
font-size:3vh;
}

.page{
background:#5cc27c;
color:white;
padding:0.5vh 1vw;
border-radius:4px;
}
</style>
</head>

<body>

<div class="topbar">
<div class="top-left">TO CENTRAL</div>
<div class="top-right">
<div class="clock" id="clock"></div>
<div class="greeting">GOOD EVENING</div>
</div>
</div>

<div class="panel">

<div class="header-row">
<div>ROUTE</div>
<div>NEXT</div>
<div>ARRIVING</div>
<div>STATUS</div>
</div>

<div id="busList"></div>

</div>

<div class="bottombar">
<div class="weather">31°C ☁</div>
<div id="date"></div>
<div>LAST <span id="lastUpdate"></span></div>
<div class="page">1/1</div>
</div>

<script>
const SERVICE_TYPE="1";

const ROUTES=[
{route:"38",dest:"平田",stopId:"C3672D8D28801773",color:"route-green"},
{route:"42C",dest:"藍田",stopId:"C3672D8D28801773",color:"route-yellow"},
{route:"40P",dest:"觀塘",stopId:"A7516C49B99EFD78",color:"route-red"}
];

let etaData={};

function updateClock(){
const now=new Date();
document.getElementById("clock").innerText=
now.toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});
document.getElementById("date").innerText=
now.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'});
}

function getMinutes(t){
return Math.max(0,Math.floor((new Date(t)-new Date())/60000));
}

function render(){
const list=document.getElementById("busList");
list.innerHTML="";

ROUTES.forEach(r=>{
const row=document.createElement("div");
row.className="row";

const etas=etaData[r.route]||[];
const m1=etas[0]?getMinutes(etas[0]):"--";
const m2=etas[1]?getMinutes(etas[1]):"--";

row.innerHTML=`
<div class="route-box ${r.color}">${r.route}</div>
<div class="next">${m1} min<br>${m2} min</div>
<div class="arriving ${m1<=3?'soon':''}">${m1} min</div>
<div class="status">${m1<=3?'LEAVING':'ON TIME'}</div>
`;

list.appendChild(row);
});
}

async function fetchETA(){
for(const r of ROUTES){
try{
const res=await fetch(
`https://data.etabus.gov.hk/v1/transport/kmb/eta/${r.stopId}/${r.route}/${SERVICE_TYPE}`
);
const data=await res.json();
const filtered=data.data.filter(x=>x.dest_tc.includes(r.dest));
etaData[r.route]=filtered.slice(0,2).map(x=>x.eta);
}catch{
etaData[r.route]=[];
}
}
document.getElementById("lastUpdate").innerText=
new Date().toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});
render();
}

updateClock();
fetchETA();
setInterval(updateClock,1000);
setInterval(fetchETA,15000);
</script>

</body>
</html>

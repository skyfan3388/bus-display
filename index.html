<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Transit Display Solid</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0f1b2d; /* ✅ 深藍實色 */
    color: #e6eefc;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

/* 背景動畫層 */
.weather-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
}

/* 雨動畫 */
.rain {
    background-image: repeating-linear-gradient(
        to bottom,
        rgba(200,220,255,0.12) 0px,
        rgba(200,220,255,0.12) 2px,
        transparent 2px,
        transparent 20px
    );
    animation: rainFall 0.6s linear infinite;
}

@keyframes rainFall {
    from { background-position: 0 0; }
    to { background-position: 0 20px; }
}

/* 雷電 */
.lightning {
    animation: flash 3s infinite;
}

@keyframes flash {
    0%, 95%, 100% { background-color: transparent; }
    96% { background-color: rgba(255,255,255,0.25); }
}

/* Header */
.header {
    height: 15vh;
    padding: 2vh 4vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 4vh;
    font-weight: 600;
    position: relative;
    z-index: 2;

    background: #16263d; /* ✅ 實色 */
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.left-header {
    display: flex;
    gap: 3vw;
    align-items: center;
}

.time {
    font-size: 6vh;
    font-weight: 700;
    color: #ffffff;
}

.weather {
    font-size: 3vh;
    display: flex;
    align-items: center;
    gap: 1vw;
    color: #cfe2ff;
}

.weather img {
    height: 4vh;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-3px); }
}

/* Table */
.table {
    width: 100%;
    height: 85vh;
    border-collapse: collapse;
    position: relative;
    z-index: 2;
}

th {
    font-size: 2.5vh;
    padding: 2vh;
    color: #7f9cc6;
    letter-spacing: 1px;
}

td {
    font-size: 5vh;
    padding: 2vh;
    border-top: 1px solid rgba(255,255,255,0.06);
}

.route {
    font-size: 8vh;
    font-weight: 700;
    color: #39ffb6; /* ✅ 實色電綠 */
}

.minutes {
    font-size: 9vh;
    font-weight: 700;
    color: #ffffff;
}

/* ✅ 3分鐘內：純紅色，無發光 */
.minutes.red {
    color: #ff4c4c;
}
</style>
</head>

<body>

<div class="weather-bg" id="weatherBg"></div>

<div class="header">
    <div class="left-header">
        <div>業成街</div>
        <div class="weather">
            <img id="weatherIcon" src="" alt="weather">
            <span id="weatherText">--°C</span>
        </div>
    </div>
    <div class="time" id="clock"></div>
</div>

<table class="table">
<tr>
<th>路線</th>
<th>終點</th>
<th>下一班</th>
<th>再下一班</th>
</tr>
<tbody id="busTable"></tbody>
</table>

<script>
const STOP_ID = "C3672D8D28801773";
const SERVICE_TYPE = "1";

const ROUTES = [
    { route: "38", dest: "平田" },
    { route: "42C", dest: "藍田站" },
    { route: "40P", dest: "觀塘碼頭" }
];

let etaData = {};

function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});
}

function getSecondsLeft(etaTime) {
    const now = new Date();
    const eta = new Date(etaTime);
    return Math.max(0, Math.floor((eta - now) / 1000));
}

function updateCountdown() {
    ROUTES.forEach(r => {
        const row = document.getElementById("row-" + r.route);
        if (!row || !etaData[r.route]) return;

        const cells = row.querySelectorAll(".eta");

        etaData[r.route].forEach((etaTime, i) => {
            const min = Math.floor(getSecondsLeft(etaTime) / 60);
            cells[i].innerText = min + "m";
            cells[i].classList.toggle("red", min <= 3);
        });
    });
}

async function fetchETA() {
    for (const r of ROUTES) {
        try {
            const res = await fetch(
              `https://data.etabus.gov.hk/v1/transport/kmb/eta/${STOP_ID}/${r.route}/${SERVICE_TYPE}`
            );
            const data = await res.json();
            const filtered = data.data.filter(item =>
                item.dest_tc.includes(r.dest)
            );
            etaData[r.route] = filtered.slice(0,2).map(x=>x.eta);
        } catch {
            etaData[r.route] = [];
        }
    }
}

async function fetchWeather() {
    try {
        const res = await fetch(
          "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc"
        );
        const data = await res.json();

        const temp = data.temperature.data[1].value;
        const humidity = data.humidity.data[0].value;
        const iconCode = data.icon[0];

        document.getElementById("weatherText").innerText =
          `${temp}°C | ${humidity}%`;

        document.getElementById("weatherIcon").src =
          `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${iconCode}.png`;

        const bg = document.getElementById("weatherBg");
        bg.className = "weather-bg";

        if ([60,61,62,63,64,65,80,81,82,83,84,85,90,91].includes(iconCode)) {
            bg.classList.add("rain");
        }

        if ([92,93].includes(iconCode)) {
            bg.classList.add("rain");
            bg.classList.add("lightning");
        }

    } catch {}
}

function buildTable() {
    const table = document.getElementById("busTable");
    table.innerHTML = "";
    ROUTES.forEach(r => {
        const row = document.createElement("tr");
        row.id = "row-" + r.route;
        row.innerHTML = `
            <td class="route">${r.route}</td>
            <td>${r.dest}</td>
            <td class="minutes eta">--</td>
            <td class="minutes eta">--</td>
        `;
        table.appendChild(row);
    });
}

buildTable();
updateClock();
fetchETA();
fetchWeather();

setInterval(updateClock,1000);
setInterval(updateCountdown,1000);
setInterval(fetchETA,15000);
setInterval(fetchWeather,600000);
</script>

</body>
</html>

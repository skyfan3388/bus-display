<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>通勤 Widget Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:linear-gradient(135deg,#1f2937,#111827);
color:#fff;
}

.topbar{
padding:16px;
font-weight:800;
font-size:20px;
display:flex;
justify-content:space-between;
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:20px;
padding:16px;
margin:16px;
}

input,select{
padding:8px;
border-radius:10px;
border:none;
margin-right:6px;
}

button{
padding:8px 12px;
border:none;
border-radius:12px;
background:#ff6b6b;
color:#fff;
font-weight:700;
cursor:pointer;
}

.message{
margin-top:8px;
font-size:14px;
color:#ffd166;
}

.route-card{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}
</style>
</head>
<body>

<div class="topbar">
<div>📱 通勤 Widget Pro</div>
<div id="clock"></div>
</div>

<div class="glass">
<input id="routeInput" placeholder="輸入路線 (例如 38)">
<select id="stopSelect"></select>
<button onclick="addRoute()">加入</button>
<button onclick="clearAll()">清空</button>
<div id="message" class="message"></div>
</div>

<div id="list" class="glass"></div>

<script>
let ROUTES = JSON.parse(localStorage.getItem("routes")) || [];
let etaData = {};

function save(){
localStorage.setItem("routes",JSON.stringify(ROUTES));
}

function updateClock(){
clock.innerText=new Date().toLocaleTimeString('zh-HK',{
hour:'2-digit',minute:'2-digit',hour12:false});
}
setInterval(updateClock,1000);
updateClock();

/* ✅ 真正穩定 loadStops */
document.getElementById("routeInput")
.addEventListener("change",loadStops);

async function loadStops(){
const route=document.getElementById("routeInput").value.trim();
const select=document.getElementById("stopSelect");
const msg=document.getElementById("message");

select.innerHTML="";
msg.innerText="";

if(!route) return;

let found=false;

/* ✅ 試 O / I */
for(const bound of ["O","I"]){

try{
const res = await fetch(
`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${bound}/1`
);

if(!res.ok) continue;

const data = await res.json();

if(data.data && data.data.length>0){

for(const s of data.data){

const stopRes = await fetch(
`https://data.etabus.gov.hk/v1/transport/kmb/stop/${s.stop}`
);

const stopInfo = await stopRes.json();

const opt=document.createElement("option");
opt.value=s.stop;
opt.textContent=`${s.seq}. ${stopInfo.data.name_tc}`;
select.appendChild(opt);
}

found=true;
break;
}
}catch(e){}
}

if(!found){
msg.innerText="找不到此路線";
return;
}

select.selectedIndex=0;
msg.innerText="已載入站點 ✅";
}

function addRoute(){
const route=document.getElementById("routeInput").value.trim();
const stopSelect=document.getElementById("stopSelect");
const stopId=stopSelect.value;
const stopName=stopSelect.selectedOptions[0]?.text;
const msg=document.getElementById("message");

if(!route || !stopId){
msg.innerText="請先載入站點";
return;
}

ROUTES.push({route,stopId,stopName});
save();
msg.innerText="已加入 ✅";
fetchETA();
}

function clearAll(){
ROUTES=[];
save();
render();
}

async function fetchETA(){
for(const r of ROUTES){
try{
const res=await fetch(
`https://data.etabus.gov.hk/v1/transport/kmb/eta/${r.stopId}/${r.route}/1`
);
const data=await res.json();
etaData[r.route]=data.data.slice(0,1).map(x=>x.eta);
}catch{
etaData[r.route]=[];
}
}
render();
}

function getMin(t){
const diff=(new Date(t)-new Date())/60000;
return Math.max(0,Math.floor(diff));
}

function render(){
const list=document.getElementById("list");
list.innerHTML="";

ROUTES.forEach(r=>{
const card=document.createElement("div");
card.className="route-card";

card.innerHTML=`
<div>
<div style="font-size:22px;font-weight:800">${r.route}</div>
<div style="font-size:13px;opacity:0.8">${r.stopName}</div>
</div>
<div style="font-size:18px;font-weight:700">
${etaData[r.route] ?
getMin(etaData[r.route][0])+" 分" : "--"}
</div>
`;

list.appendChild(card);
});
}

fetchETA();
setInterval(fetchETA,15000);

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>

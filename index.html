<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>通勤 Widget Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<style>
html,body{
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:linear-gradient(135deg,#1f2937,#111827);
color:#fff;
min-height:100vh;
}

.topbar{
padding:16px;
font-weight:800;
font-size:20px;
display:flex;
justify-content:space-between;
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:20px;
padding:16px;
margin:16px;
box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

input,select{
padding:8px;
border-radius:10px;
border:none;
margin-right:6px;
}

button{
padding:8px 12px;
border:none;
border-radius:12px;
background:#ff6b6b;
color:#fff;
font-weight:700;
cursor:pointer;
}

.route-card{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
margin-bottom:12px;
border-radius:18px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
}

.route-number{
font-size:24px;
font-weight:900;
}

.route-stop{
font-size:13px;
opacity:0.8;
}

.time{
font-size:18px;
font-weight:700;
}

.delete-btn{
background:#ff4d4f;
padding:6px 10px;
border-radius:10px;
font-size:16px;
}

.message{
margin-top:8px;
font-size:14px;
color:#ffd166;
}
</style>
</head>
<body>

<div class="topbar">
<div>📱 通勤 Widget Pro</div>
<div id="clock"></div>
</div>

<div class="glass">
<input id="routeInput" placeholder="輸入路線 (例如 38)">
<select id="stopSelect"></select>
<button onclick="addRoute()">加入</button>
<button onclick="clearAll()">清空</button>
<div id="message" class="message"></div>
</div>

<div id="list" class="glass"></div>

<script>
let ROUTES = JSON.parse(localStorage.getItem("routes")) || [];
let etaData = {};

function save(){
localStorage.setItem("routes",JSON.stringify(ROUTES));
}

function updateClock(){
clock.innerText=new Date().toLocaleTimeString('zh-HK',{
hour:'2-digit',minute:'2-digit',hour12:false});
}
setInterval(updateClock,1000);
updateClock();

/* ✅ 載入站點（修正 API 格式） */
document.getElementById("routeInput")
.addEventListener("change",loadStops);

async function loadStops(){
const route=document.getElementById("routeInput").value.trim();
const select=document.getElementById("stopSelect");
const msg=document.getElementById("message");

select.innerHTML="";
msg.innerText="";

if(!route) return;

try{

/* 1️⃣ 查 route */
const routeCheck = await fetch(
`https://data.etabus.gov.hk/v1/transport/kmb/route/${route}`
);
const routeData = await routeCheck.json();

if(!routeData.data || routeData.data.length===0){
msg.innerText="找不到此路線";
return;
}

/* 2️⃣ 取得 bound (O / I) + service_type */
const bound = routeData.data[0].bound;
const serviceType = routeData.data[0].service_type;

/* 3️⃣ 正確 route-stop API */
const stopRes = await fetch(
`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${bound}/${serviceType}`
);

const stopData = await stopRes.json();

for(const s of stopData.data){

const singleStop = await fetch(
`https://data.etabus.gov.hk/v1/transport/kmb/stop/${s.stop}`
);

const stopInfo = await singleStop.json();

const opt=document.createElement("option");
opt.value=s.stop;
opt.textContent=`${s.seq}. ${stopInfo.data.name_tc}`;
select.appendChild(opt);
}

if(select.options.length>0){
select.selectedIndex=0;
msg.innerText="已載入站點 ✅";
}

}catch(e){
msg.innerText="API 讀取失敗";
console.error(e);
}
}

function addRoute(){
const route=document.getElementById("routeInput").value.trim();
const stopSelect=document.getElementById("stopSelect");
const stopId=stopSelect.value;
const stopName=stopSelect.selectedOptions[0]?.text;
const msg=document.getElementById("message");

if(!route || !stopId){
msg.innerText="請先載入站點";
return;
}

ROUTES.push({route,stopId,stopName});
save();
msg.innerText="已加入 ✅";
fetchETA();
}

function clearAll(){
ROUTES=[];
save();
render();
}

async function fetchETA(){
for(const r of ROUTES){
try{
const res=await fetch(
`https://data.etabus.gov.hk/v1/transport/kmb/eta/${r.stopId}/${r.route}/1`
);
const data=await res.json();
etaData[r.route]=data.data.slice(0,1).map(x=>x.eta);
}catch{
etaData[r.route]=[];
}
}
render();
}

function getMin(t){
const diff=(new Date(t)-new Date())/60000;
return Math.max(0,Math.floor(diff));
}

function render(){
const list=document.getElementById("list");
list.innerHTML="";

ROUTES.forEach((r,index)=>{
const card=document.createElement("div");
card.className="route-card";

card.innerHTML=`
<div>
<div class="route-number">${r.route}</div>
<div class="route-stop">${r.stopName}</div>
</div>
<div>
<div class="time">
${etaData[r.route] ?
getMin(etaData[r.route][0])+" 分" : "--"}
</div>
</div>
`;

list.appendChild(card);
});
}

fetchETA();
setInterval(fetchETA,15000);

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>

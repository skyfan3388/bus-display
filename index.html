<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>通勤 Widget Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b6b">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
html,body{
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:linear-gradient(135deg,#1f2937,#111827);
color:#fff;
min-height:100vh;
}

.topbar{
padding:16px;
font-weight:800;
font-size:20px;
display:flex;
justify-content:space-between;
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:20px;
padding:16px;
margin:16px;
box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

input,select{
padding:8px;
border-radius:10px;
border:none;
outline:none;
}

button{
padding:8px 14px;
border:none;
border-radius:12px;
background:#ff6b6b;
color:#fff;
font-weight:700;
cursor:pointer;
}

.route-card{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
margin-bottom:10px;
border-radius:16px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(8px);
cursor:grab;
}

.route-number{
font-size:26px;
font-weight:900;
}

.time{
font-size:18px;
}

.dragging{
opacity:0.5;
}
</style>
</head>
<body>

<div class="topbar">
<div>📱 通勤 Widget Pro</div>
<div id="clock"></div>
</div>

<div class="glass">
<input id="routeInput" placeholder="輸入路線">
<select id="stopSelect"></select>
<button onclick="addRoute()">加入</button>
</div>

<div id="list" class="glass"></div>

<script>
const SERVICE_TYPE="1";
let ROUTES=JSON.parse(localStorage.getItem("routes"))||[];
let etaData={};
let stopNames={};

function save(){
localStorage.setItem("routes",JSON.stringify(ROUTES));
}

function updateClock(){
clock.innerText=new Date().toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit',hour12:false});
}
setInterval(updateClock,1000);
updateClock();

document.getElementById("routeInput").addEventListener("change",loadStops);

async function loadStops(){
const route=document.getElementById("routeInput").value.trim();
if(!route)return;

const res=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/1`);
const data=await res.json();

const select=document.getElementById("stopSelect");
select.innerHTML="";

for(const s of data.data){
const stopRes=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${s.stop}`);
const stopData=await stopRes.json();

const opt=document.createElement("option");
opt.value=s.stop;
opt.textContent=`${s.seq}. ${stopData.data.name_tc}`;
select.appendChild(opt);
}
}

function addRoute(){
const route=document.getElementById("routeInput").value.trim();
const stopId=document.getElementById("stopSelect").value;
const stopName=document.getElementById("stopSelect").selectedOptions[0]?.text;

if(!route||!stopId)return;

ROUTES.push({route,stopId,stopName});
save();
fetchETA();
}

async function fetchETA(){
for(const r of ROUTES){
const res=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${r.stopId}/${r.route}/${SERVICE_TYPE}`);
const data=await res.json();
etaData[r.route]=data.data.slice(0,2).map(x=>x.eta);
}
render();
}
setInterval(fetchETA,15000);

function getMin(t){
const diff=(new Date(t)-new Date())/60000;
return Math.max(0,Math.floor(diff));
}

function render(){
const list=document.getElementById("list");
list.innerHTML="";

ROUTES.forEach((r,index)=>{
const card=document.createElement("div");
card.className="route-card";
card.draggable=true;

card.addEventListener("dragstart",()=>card.classList.add("dragging"));
card.addEventListener("dragend",()=>{
card.classList.remove("dragging");
save();
});

card.innerHTML=`
<div>
<div class="route-number">${r.route}</div>
<div>${r.stopName||""}</div>
</div>
<div class="time">
${etaData[r.route]?
getMin(etaData[r.route][0])+" 分": "--"}
</div>
<button onclick="deleteRoute(${index})">🗑</button>
`;

card.addEventListener("dragover",e=>{
e.preventDefault();
const dragging=document.querySelector(".dragging");
if(dragging!==card){
list.insertBefore(dragging,card);
const newOrder=[...list.children].map(el=>ROUTES[[...list.children].indexOf(el)]);
ROUTES=newOrder;
}
});

list.appendChild(card);
});
}

function deleteRoute(i){
ROUTES.splice(i,1);
save();
fetchETA();
}

fetchETA();
</script>

</body>
</html>

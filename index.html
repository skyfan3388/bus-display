<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- ✅ iOS PWA 全屏 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bus Display">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Transit Display</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: #0f1b2d;
    color: #e6eefc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    overflow-x: hidden;

    /* ✅ Safe area 適配 */
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

/* Header */
.header {
    padding: 3vh 5vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #16263d;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.left-header {
    display: flex;
    flex-direction: column;
    gap: 1vh;
}

.stop-name {
    font-size: 5vw;
    font-weight: 600;
}

.weather {
    font-size: 3.5vw;
    color: #cfe2ff;
    display: flex;
    align-items: center;
    gap: 2vw;
}

.weather img {
    height: 4vw;
}

.time {
    font-size: 8vw;
    font-weight: 700;
    color: #ffffff;
}

/* 橫向時調整字體 */
@media (orientation: landscape) {
    .stop-name { font-size: 3vh; }
    .weather { font-size: 2vh; }
    .weather img { height: 3vh; }
    .time { font-size: 6vh; }
}

/* Table */
.table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    padding: 3vh 5vw;
    font-size: 3.5vw;
    color: #7f9cc6;
}

td {
    padding: 4vh 5vw;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 6vw;
}

.route {
    font-weight: 700;
    color: #39ffb6;
    font-size: 10vw;
}

.minutes {
    font-weight: 700;
}

.minutes.red {
    color: #ff4c4c;
}

/* 橫向表格比例 */
@media (orientation: landscape) {
    th { font-size: 2vh; }
    td { font-size: 4vh; }
    .route { font-size: 7vh; }
}
</style>
</head>

<body>

<div class="header">
    <div class="left-header">
        <div class="stop-name">業成街</div>
        <div class="weather">
            <img id="weatherIcon" src="">
            <span id="weatherText">--°C</span>
        </div>
    </div>
    <div class="time" id="clock"></div>
</div>

<table class="table">
<thead>
<tr>
<th>路線</th>
<th>終點</th>
<th>下一班</th>
<th>再下一班</th>
</tr>
</thead>
<tbody id="busTable"></tbody>
</table>

<script>
const STOP_ID = "C3672D8D28801773";
const SERVICE_TYPE = "1";

const ROUTES = [
    { route: "38", dest: "平田" },
    { route: "42C", dest: "藍田站" },
    { route: "40P", dest: "觀塘碼頭" }
];

let etaData = {};

function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});
}

function getSecondsLeft(etaTime) {
    const now = new Date();
    const eta = new Date(etaTime);
    return Math.max(0, Math.floor((eta - now) / 1000));
}

function updateCountdown() {
    ROUTES.forEach(r => {
        const row = document.getElementById("row-" + r.route);
        if (!row || !etaData[r.route]) return;

        const cells = row.querySelectorAll(".eta");

        etaData[r.route].forEach((etaTime, i) => {
            const min = Math.floor(getSecondsLeft(etaTime) / 60);
            cells[i].innerText = min + "m";
            cells[i].classList.toggle("red", min <= 3);
        });
    });
}

async function fetchETA() {
    for (const r of ROUTES) {
        try {
            const res = await fetch(
              `https://data.etabus.gov.hk/v1/transport/kmb/eta/${STOP_ID}/${r.route}/${SERVICE_TYPE}`
            );
            const data = await res.json();
            const filtered = data.data.filter(item =>
                item.dest_tc.includes(r.dest)
            );
            etaData[r.route] = filtered.slice(0,2).map(x=>x.eta);
        } catch {
            etaData[r.route] = [];
        }
    }
}

async function fetchWeather() {
    try {
        const res = await fetch(
          "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc"
        );
        const data = await res.json();

        const temp = data.temperature.data[1].value;
        const humidity = data.humidity.data[0].value;
        const iconCode = data.icon[0];

        document.getElementById("weatherText").innerText =
          `${temp}°C | ${humidity}%`;

        document.getElementById("weatherIcon").src =
          `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${iconCode}.png`;

    } catch {}
}

function buildTable() {
    const table = document.getElementById("busTable");
    table.innerHTML = "";
    ROUTES.forEach(r => {
        const row = document.createElement("tr");
        row.id = "row-" + r.route;
        row.innerHTML = `
            <td class="route">${r.route}</td>
            <td>${r.dest}</td>
            <td class="minutes eta">--</td>
            <td class="minutes eta">--</td>
        `;
        table.appendChild(row);
    });
}

buildTable();
updateClock();
fetchETA();
fetchWeather();

setInterval(updateClock,1000);
setInterval(updateCountdown,1000);
setInterval(fetchETA,15000);
setInterval(fetchWeather,600000);
</script>

</body>
</html>
